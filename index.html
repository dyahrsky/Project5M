<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring SyaLALALA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Lexend', sans-serif; }
        
        /* Sidebar Styling */
        .sidebar-bg { background-color: #161d2b; }
        .nav-item { color: #94a3b8; transition: all 0.2s ease; }
        .nav-active { 
            background-color: #10b981; /* Hijau Emerald sesuai request */
            color: white !important;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        /* Pill Tab Styling (Header) */
        .pill-container {
            background-color: #f1f5f9;
            padding: 4px;
            border-radius: 12px;
            display: inline-flex;
            border: 1px solid #e2e8f0;
        }
        .pill-item {
            padding: 8px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: #64748b;
        }
        .pill-item.active {
            background-color: white;
            color: #2563eb;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        #map { height: 480px; width: 100%; border-radius: 20px; z-index: 1; }
    </style>
</head>
<body class="bg-[#fcfdfe]">

    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-72 sidebar-bg text-white flex flex-col p-6 shrink-0">
            <div class="flex flex-col items-center text-center mb-10">
                <div class="w-20 h-20 mb-4 bg-white rounded-full flex items-center justify-center p-2 border-2 border-blue-500/30">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/BMG_2003.png" alt="BMKG" class="w-14">
                </div>
                <h2 class="text-[11px] font-extrabold tracking-[0.15em] leading-tight uppercase text-white">
                    Direktorat<br>Meteorologi Penerbangan
                </h2>
                <span class="text-[10px] text-blue-400 font-bold mt-1">BMKG</span>
            </div>

            <div class="flex-grow">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-6 px-4">Data Monitoring</p>
                <nav class="space-y-2">
                    <a href="#" class="nav-item nav-active flex items-center gap-4 px-5 py-3 rounded-xl text-sm font-medium">
                        <i class="fa-solid fa-satellite-dish w-5 text-center"></i> SYNOP
                    </a>
                    <a href="#" class="nav-item flex items-center gap-4 px-5 py-3 rounded-xl text-sm font-medium">
                        <i class="fa-solid fa-plane-departure w-5 text-center"></i> METAR
                    </a>
                    <a href="#" class="nav-item flex items-center gap-4 px-5 py-3 rounded-xl text-sm font-medium">
                        <i class="fa-solid fa-mountain-sun w-5 text-center"></i> AMP
                    </a>
                    <a href="#" class="nav-item flex items-center gap-4 px-5 py-3 rounded-xl text-sm font-medium">
                        <i class="fa-solid fa-bullseye w-5 text-center"></i> IKU
                    </a>
                </nav>
            </div>

            <button class="w-full flex items-center justify-center gap-2 py-3 border border-slate-700 rounded-xl text-xs font-bold text-slate-400 hover:bg-slate-800 transition">
                <i class="fa-solid fa-right-to-bracket"></i> Login Admin
            </button>
        </aside>

        <main class="flex-grow flex flex-col overflow-hidden">
            
            <header class="bg-white border-b border-gray-100 px-10 py-6 flex justify-between items-center shrink-0">
                <div>
                    <h1 class="text-3xl font-normal text-slate-900">
                        <span class="font-extrabold">Monitoring</span> 
                        <span class="text-blue-600 font-bold italic">SyaLALALA</span>
                    </h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                        <p class="text-[11px] text-slate-400 font-medium">Update At: 02/03/2026 14:00 WIB</p>
                    </div>
                </div>

                <div class="pill-container">
                    <button class="pill-item active">Sebaran</button>
                    <button class="pill-item hover:text-slate-800 transition">Ranking</button>
                    <button class="pill-item hover:text-slate-800 transition">Raport</button>
                </div>
            </header>

            <div class="flex-grow overflow-y-auto p-10 space-y-8">
                
                <section class="bg-white p-2 rounded-[28px] shadow-[0_10px_40px_-15px_rgba(0,0,0,0.08)] border border-gray-100 relative">
                    <div id="map"></div>
                    
                    <button class="absolute top-6 right-6 z-[1000] bg-white p-3 rounded-xl shadow-lg text-slate-600 hover:text-blue-600 transition">
                        <i class="fa-solid fa-expand text-lg"></i>
                    </button>
                </section>

                <section class="bg-white rounded-[28px] shadow-[0_10px_40px_-15px_rgba(0,0,0,0.08)] border border-gray-100 overflow-hidden">
                    <div class="px-8 py-6 border-b border-gray-50 flex justify-between items-center">
                        <h3 class="text-lg font-bold text-slate-800 tracking-tight">Tabel Rangking Interaktif</h3>
                        <button class="bg-slate-50 border border-slate-200 px-4 py-2 rounded-xl text-[11px] font-bold text-slate-500 hover:bg-slate-100 transition flex items-center gap-2">
                            <i class="fa-solid fa-filter"></i> FILTER TABEL
                        </button>
                    </div>
                    <div class="p-4">
                        <table class="w-full">
                            <thead>
                                <tr class="text-[10px] uppercase tracking-[0.1em] text-slate-400 font-bold">
                                    <th class="px-6 py-4 text-left">No</th>
                                    <th class="px-6 py-4 text-left">Nama Stasiun</th>
                                    <th class="px-6 py-4 text-left">Skor Akhir</th>
                                    <th class="px-6 py-4 text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody class="text-sm text-slate-600 divide-y divide-gray-50">
                                <tr class="hover:bg-blue-50/40 transition">
                                    <td class="px-6 py-4 font-bold">01</td>
                                    <td class="px-6 py-4 font-semibold text-slate-800">Stasiun Meteorologi Klas I Soekarno-Hatta</td>
                                    <td class="px-6 py-4 font-mono font-bold text-blue-600">98.42</td>
                                    <td class="px-6 py-4 text-center">
                                        <span class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-lg text-[10px] font-bold border border-emerald-100">EXCELLENT</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inisialisasi Peta
        var map = L.map('map', { 
            zoomControl: false,
            attributionControl: false 
        }).setView([-2.5, 118], 5);

        // Basemap CartoDB Light
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // Tambah Zoom Control di kanan bawah agar tidak menutupi desain
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // Marker Contoh
        L.circleMarker([-6.1256, 106.6559], {
            radius: 8,
            fillColor: "#10b981",
            color: "white",
            weight: 2,
            opacity: 1,
            fillOpacity: 0.8
        }).addTo(map).bindPopup("<b>CGK</b><br>Kondisi: Normal");
    </script>
</body>
</html>
